<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Natsumin Apps</title>
  <meta name="description" content="Official website for apps developed by Natsumin.">
  <script>
    (function () {
      var languages = navigator.languages || [navigator.language || navigator.userLanguage || ""];
      var isJapanese = languages.some(function (language) {
        return String(language).toLowerCase().indexOf("ja") === 0;
      });

      document.documentElement.lang = isJapanese ? "ja" : "en";
      document.documentElement.className = isJapanese ? "is-ja" : "is-en";
    }());
  </script>
  <style>
    :root {
      color-scheme: light;
      --ink: #26231f;
      --muted: #6a635b;
      --paper: #fbf8f1;
      --line: #ded5c8;
      --accent: #2f5a45;
      --panel: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", sans-serif;
      line-height: 1.7;
    }

    a {
      color: inherit;
    }

    a:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--accent) 48%, transparent);
      outline-offset: 4px;
    }

    header,
    main,
    footer {
      width: min(960px, calc(100% - 40px));
      margin: 0 auto;
    }

    header {
      padding: 56px 0 28px;
    }

    .brand {
      margin: 0;
      font-size: clamp(34px, 7vw, 64px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .lead {
      max-width: 620px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 17px;
    }

    .apps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      padding: 22px 0 56px;
    }

    .app {
      display: grid;
      grid-template-columns: 124px 1fr;
      align-items: center;
      gap: 20px;
      min-height: 172px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      text-decoration: none;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .app:focus-within,
    .app:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent) 38%, var(--line));
      box-shadow: 0 14px 36px rgba(38, 35, 31, 0.1);
    }

    .app-art {
      display: block;
      width: 124px;
      height: 124px;
      object-fit: cover;
      border-radius: 20px;
      box-shadow: 0 12px 24px rgba(38, 35, 31, 0.14);
    }

    .app-body {
      display: grid;
      gap: 14px;
    }

    .app h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .app p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      color: var(--accent);
      font-weight: 700;
    }

    .links a {
      text-decoration-thickness: 1px;
      text-underline-offset: 4px;
    }

    .i18n-ja {
      display: none;
    }

    .is-ja .i18n-en {
      display: none;
    }

    .is-ja .i18n-ja {
      display: inline;
    }

    .is-ja a.i18n-ja {
      display: inline;
    }

    footer {
      padding: 26px 0 38px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 560px) {
      header,
      main,
      footer {
        width: min(100% - 28px, 960px);
      }

      header {
        padding-top: 38px;
      }

      .app {
        grid-template-columns: 78px 1fr;
        gap: 16px;
        min-height: 0;
        padding: 16px;
      }

      .app-art {
        width: 78px;
        height: 78px;
        border-radius: 16px;
      }

      .app h2 {
        font-size: 23px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1 class="brand">Natsumin Apps</h1>
    <p class="lead">
      <span class="i18n-en">Apps made to make everyday typing and small tasks feel a little more comfortable.</span>
      <span class="i18n-ja">日々の入力や小さな作業を、少し心地よくするためのアプリを作っています。</span>
    </p>
  </header>

  <main>
    <section class="apps" aria-label="Apps">
      <article class="app">
        <img class="app-art" src="./assets/kotokey-icon.png" alt="" width="1024" height="1024">
        <span class="app-body">
          <h2>KotoKey</h2>
          <p>
            <span class="i18n-en">A keyboard app made for comfortable everyday typing.</span>
            <span class="i18n-ja">毎日の入力に、心地よい打鍵感を。</span>
          </p>
          <span class="links">
            <a class="i18n-en" href="https://natsumica.github.io/kotokey-site/en/">English</a>
            <a class="i18n-en" href="https://natsumica.github.io/kotokey-site/ja/">Japanese</a>
            <a class="i18n-en" href="https://natsumica.github.io/kotokey-site/en/privacy/">Privacy</a>
            <a class="i18n-ja" href="https://natsumica.github.io/kotokey-site/ja/">日本語</a>
            <a class="i18n-ja" href="https://natsumica.github.io/kotokey-site/en/">English</a>
            <a class="i18n-ja" href="https://natsumica.github.io/kotokey-site/ja/privacy/">プライバシー</a>
          </span>
        </span>
      </article>
    </section>
  </main>

  <footer>
    <span>&copy; 2026 Natsumin</span>
  </footer>
</body>
</html>
